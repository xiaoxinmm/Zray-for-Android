name: Build APK v2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Android 项目
        uses: actions/checkout@v4

      - name: Checkout Zray Go 核心
        uses: actions/checkout@v4
        with:
          repository: xiaoxinmm/Zray
          path: zray-go
          ref: main
          token: ${{ secrets.GH_PAT }}

      # ========== Go 核心交叉编译 ==========
      - name: Set up Go 1.24
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Cross-compile Go core for Android arm64
        run: |
          cd zray-go
          mkdir -p ../app/src/main/jniLibs/arm64-v8a
          GOOS=android GOARCH=arm64 CGO_ENABLED=0 \
            go build -trimpath -ldflags="-s -w" \
            -o ../app/src/main/jniLibs/arm64-v8a/libzraycore.so \
            ./cmd/zray-client/
          ls -lh ../app/src/main/jniLibs/arm64-v8a/libzraycore.so
          echo "Go 核心编译完成 ✅"

      # ========== Android APK 编译 ==========
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build Release APK (signed)
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease

      # ========== 发布 ==========
      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/Zray-v${{ steps.version.outputs.version }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Zray-v${{ steps.version.outputs.version }}
          path: app/build/outputs/apk/release/Zray-v${{ steps.version.outputs.version }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "v${{ steps.version.outputs.version }}"
          files: app/build/outputs/apk/release/Zray-v${{ steps.version.outputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
