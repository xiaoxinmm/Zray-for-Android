name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
          - goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Tidy
        run: go mod tidy

      - name: Build server
        run: |
          mkdir -p build
          go build -ldflags="-s -w" -o build/zray-server-linux-${{ matrix.goarch }} ./cmd/zray-server/
          go build -ldflags="-s -w" -o build/zray-client-linux-${{ matrix.goarch }} ./cmd/zray-client/
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}

      - name: Package
        run: |
          cp configs/server.example.json build/server-config.json
          cp configs/client.example.json build/client-config.json
          cp rules/geosite-cn.txt build/
          cp scripts/*.sh build/
          cd build && tar czf zray-linux-${{ matrix.goarch }}.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.goarch }}
          path: build/zray-linux-${{ matrix.goarch }}.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Tidy
        run: go mod tidy

      - name: Build Go core
        run: go build -ldflags="-s -w" -o build/zray-client.exe ./cmd/zray-client/
        env:
          CGO_ENABLED: 0

      - name: Build Go server
        run: go build -ldflags="-s -w" -o build/zray-server.exe ./cmd/zray-server/
        env:
          CGO_ENABLED: 0

      - name: Build WPF GUI
        run: |
          cd gui/ZRayClient
          dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ../../build/gui

      - name: Package
        run: |
          copy configs\client.example.json build\config.json
          copy rules\geosite-cn.txt build\geosite-cn.txt
          copy build\gui\ZRay-GUI.exe build\ZRay-GUI.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            build/zray-client.exe
            build/zray-server.exe
            build/ZRay-GUI.exe
            build/config.json
            build/geosite-cn.txt

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package Windows
        run: |
          cd artifacts/windows && zip -r ../../ZRay-Windows.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ZRay-Windows.zip
            artifacts/linux-amd64/zray-linux-amd64.tar.gz
            artifacts/linux-arm64/zray-linux-arm64.tar.gz
          generate_release_notes: true
